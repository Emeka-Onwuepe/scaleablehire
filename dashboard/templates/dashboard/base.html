<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScaleableHire Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
      @layer base {
        body { @apply bg-slate-50 text-slate-900 antialiased; }
        input, textarea, select { @apply block w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm transition duration-150 ease-in-out focus:border-sky-500 focus:ring-1 focus:ring-sky-500; }
        label { @apply mb-2 block text-sm font-medium text-slate-700; }
        .info-text { @apply text-sm text-slate-500; }
        .btn-primary { @apply rounded-full bg-sky-600 px-3 py-2 font-medium text-white transition hover:bg-sky-700 sm:px-4; }
      }
    </style>
</head>
<body>
<div class="mx-auto max-w-6xl  sm:px-6 lg:px-8">
    <header class="mb-6  bg-white p-4 shadow-soft sm:mb-8 sm:p-6 sm:flex sm:items-center sm:justify-between">
        <div>
            <h1 class="text-2xl font-semibold tracking-tight text-slate-900 sm:text-3xl">ScaleableHire</h1>
        </div>
        <div class="mt-4 flex flex-wrap justify-center gap-2 text-sm sm:mt-0">
            {% if request.user.is_authenticated %}
            {% comment %} sky-600 {% endcomment %}
                <a class="rounded-full bg-sky-600 px-3 py-2 font-medium text-white transition hover:bg-sky-700 sm:px-4" href="{% url 'dashboard' %}">Dashboard</a>
                <a class="rounded-full bg-sky-600 px-3 py-2 font-medium text-white transition hover:bg-sky-700 sm:px-4" href="{% url 'submit_idea' %}">New Idea</a>
                <a class="rounded-full bg-sky-600 px-3 py-2 font-medium text-white transition hover:bg-sky-700 sm:px-4" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="rounded-full bg-slate-100 px-3 py-2 font-medium text-slate-700 transition hover:bg-slate-200 sm:px-4" href="{% url 'login' %}">Login</a>
                <a class="rounded-full bg-sky-600 px-3 py-2 font-medium text-white transition hover:bg-sky-700 sm:px-4" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </header>
    {% block content %}{% endblock %}
</div>
</body>
</html>
