<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScaleableHire Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f7f8fc; }
        .container { max-width: 900px; margin: 0 auto; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; }
        .card { background: white; padding: 18px; margin-bottom: 18px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .actions a { margin-right: 12px; }
        .idea, textarea, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 12px; }
        button { background: #2f7edc; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; }
        button:hover { background: #255fb0; }
        .info { color: #555; }
        .errorlist { color: red; margin-bottom: 12px; }
        .nav-links a { margin-right: 12px; }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <div>
            <h1>ScaleableHire</h1>
            {% comment %} <p class="info">Role: {{ request.user.User.role|capfirst if request.user.is_authenticated else 'Guest' }}</p> {% endcomment %}
        </div>
        <div class="nav-links">
            {% if request.user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'submit_idea' %}">New Idea</a>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </header>
    {% block content %}{% endblock %}
</div>
</body>
</html>
